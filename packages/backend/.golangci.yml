run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - cyclop
    - depguard
    - errcheck
    - funlen
    - gocritic
    - gofmt
    - goimports
    - gosec
    - gosimple
    - govet
    - ineffassign
    - nolintlint
    - revive
    - staticcheck
    - unused

linters-settings:
  cyclop:
    max-complexity: 15
  depguard:
    rules:
      cmd:
        files:
          - cmd/api/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/app
      domain:
        files:
          - internal/domain/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/types
      types:
        files:
          - internal/types/*.go
        allow:
          - $gostd
          - github.com/oklog/ulid/v2
          - www-template/packages/backend/internal/types
      usecases:
        files:
          - internal/usecases/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/types
          - www-template/packages/backend/internal/usecases
      http:
        files:
          - internal/http/*.go
        allow:
          - $gostd
          - github.com/gin-contrib/cors
          - github.com/gin-gonic/gin
          - github.com/oapi-codegen/runtime/types
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/generated/openapi
          - www-template/packages/backend/internal/http
          - www-template/packages/backend/internal/types
          - www-template/packages/backend/internal/usecases
      persistence:
        files:
          - internal/persistence/*.go
        allow:
          - $gostd
          - github.com/redis/go-redis/v9
          - gorm.io/driver/postgres
          - gorm.io/gorm
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/persistence
          - www-template/packages/backend/internal/types
      app:
        files:
          - internal/app/*.go
        allow:
          - $gostd
          - github.com/oklog/ulid/v2
          - www-template/packages/backend/internal/app
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/http
          - www-template/packages/backend/internal/persistence
          - www-template/packages/backend/internal/types
          - www-template/packages/backend/internal/usecases
  funlen:
    lines: 100
    statements: 60
  goimports:
    local-prefixes: www-template
  nolintlint:
    require-explanation: true
    require-specific: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: if-return
      - name: receiver-naming
      - name: var-naming

issues:
  exclude-use-default: false

  exclude-rules:
    - path: tools/analyzers/cmd/guardrails/main.go
      linters:
        - cyclop
        - funlen
        - gocritic
        - gosec
    - path: internal/usecases/auth_service_test\.go
      linters:
        - gosec
