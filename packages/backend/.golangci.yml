run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - cyclop
    - depguard
    - errcheck
    - funlen
    - gocritic
    - gofmt
    - goimports
    - gosec
    - gosimple
    - govet
    - ineffassign
    - nolintlint
    - revive
    - staticcheck
    - unused

linters-settings:
  cyclop:
    max-complexity: 15
  depguard:
    rules:
      cmd:
        files:
          - cmd/api/*.go
          - cmd/admin-api/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/app
      domain:
        files:
          - internal/domain/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/types
      types:
        files:
          - internal/types/*.go
        allow:
          - $gostd
          - github.com/oklog/ulid/v2
          - www-template/packages/backend/internal/types
      application:
        files:
          - internal/application/*.go
          - internal/application/**/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/platform
      adapter-http:
        files:
          - internal/adapter/http/*.go
          - internal/adapter/http/**/*.go
        allow:
          - $gostd
          - github.com/gin-contrib/cors
          - github.com/gin-gonic/gin
          - github.com/oapi-codegen/runtime/types
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/generated/openapi
          - www-template/packages/backend/internal/generated/adminopenapi
          - www-template/packages/backend/internal/platform
          - www-template/packages/backend/internal/adapter/http
      adapter-postgres:
        files:
          - internal/adapter/postgres/*.go
          - internal/adapter/postgres/**/*.go
        allow:
          - $gostd
          - gorm.io/driver/postgres
          - gorm.io/gorm
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/platform
          - www-template/packages/backend/internal/adapter/postgres
      adapter-valkey:
        files:
          - internal/adapter/valkey/*.go
          - internal/adapter/valkey/**/*.go
        allow:
          - $gostd
          - github.com/redis/go-redis/v9
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/platform
          - www-template/packages/backend/internal/adapter/valkey
      adapter-webauthn:
        files:
          - internal/adapter/webauthn/*.go
          - internal/adapter/webauthn/**/*.go
        allow:
          - $gostd
          - github.com/go-webauthn/webauthn
          - github.com/go-webauthn/webauthn/protocol
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/platform
          - www-template/packages/backend/internal/adapter/webauthn
      adapter-mailer:
        files:
          - internal/adapter/mailer/*.go
          - internal/adapter/mailer/**/*.go
        allow:
          - $gostd
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/platform
          - www-template/packages/backend/internal/adapter/mailer
      app:
        files:
          - internal/app/*.go
        allow:
          - $gostd
          - github.com/go-webauthn/webauthn
          - github.com/go-webauthn/webauthn/protocol
          - github.com/oklog/ulid/v2
          - www-template/packages/backend/internal/app
          - www-template/packages/backend/internal/adapter/http
          - www-template/packages/backend/internal/adapter/mailer
          - www-template/packages/backend/internal/adapter/postgres
          - www-template/packages/backend/internal/adapter/valkey
          - www-template/packages/backend/internal/adapter/webauthn
          - www-template/packages/backend/internal/application
          - www-template/packages/backend/internal/domain
          - www-template/packages/backend/internal/platform
  funlen:
    lines: 100
    statements: 60
  goimports:
    local-prefixes: www-template
  nolintlint:
    require-explanation: true
    require-specific: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: if-return
      - name: receiver-naming
      - name: var-naming

issues:
  exclude-use-default: false

  exclude-rules:
    - path: tools/analyzers/cmd/guardrails/main.go
      linters:
        - cyclop
        - funlen
        - gocritic
        - gosec
    - path: internal/usecases/auth_service_test\.go
      linters:
        - gosec
