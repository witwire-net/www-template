# Admin Console 静的 SPA 用 nginx 設定。
# HTML は no-store、fingerprinted asset は immutable、API path は静的 fallback しない。

server {
  listen 80;
  server_name _;

  # SvelteKit adapter-static の dist を配信 root にする。
  root /usr/share/nginx/html;
  index index.html;

  # Go Admin API は別 runtime が所有するため、静的 SPA の index.html に fallback させない。
  location ^~ /api/v1/ {
    add_header Cache-Control "no-store" always;
    return 404;
  }

  # content hash 付き asset だけ長期 cache を許可する。
  location ^~ /_app/immutable/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # client-side routing の直アクセスは index.html に戻し、HTML は常に再検証させる。
  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }
}
