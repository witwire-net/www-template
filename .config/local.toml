[app]
environment = "development"
bearer_token = "dev-app-auth"

[server]
port = 8080
allowed_origins = [
  "http://www.localhost:5173",
  "http://app.localhost:5174",
]

[auth]
webauthn_rp_id = "app.localhost"
account_recovery_url_base = "http://app.localhost:5174/login/recovery/consume"
challenge_ttl = "5m"
recovery_token_ttl = "30m"
recovery_session_ttl = "15m"
session_idle_ttl = "12h"
session_absolute_ttl = "336h"
refresh_token_ttl = "168h"
passkey_start_limit = 5
passkey_start_window = "5m"
recovery_email_limit = 3
recovery_email_window = "1h"
recovery_ip_limit = 10
recovery_ip_window = "1h"
failure_threshold = 10
failure_window = "15m"
failure_duration = "15m"
secret_hash_key = "dev-pepper-change-in-production"
jwt_secret = "change-this-to-a-long-random-jwt-secret-in-production"

[database]
url = "postgres://www-template:www-template@postgres:5432/www-template?sslmode=disable"

[valkey]
url = "redis://valkey:6379/0"
key_prefix = "www-template"

[opensearch]
url = "http://opensearch:9200"

[object_storage]
endpoint = "http://minio:9000"
region = "us-east-1"
bucket = "template"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
use_path_style = true

[smtp]
host = "mailpit"
port = 1025
username = ""
password = ""

[mail]
from_address = "noreply@example.com"

[observability]
otel_exporter_otlp_endpoint = "signoz-otel-collector:4317"
otel_exporter_otlp_traces_endpoint = "signoz-otel-collector:4317"
otel_exporter_otlp_logs_endpoint = "signoz-otel-collector:4317"
otel_service_name = "www-template-api"
otel_resource_attributes = "service.namespace=www-template,deployment.environment=development"
