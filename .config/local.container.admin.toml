# Admin Console local container configuration.
# The local bootstrap plaintext is: dev-admin-bootstrap-secret

[server]
origin = "http://localhost:3001"

[auth]
jwt_secret = "dev-admin-jwt-secret-change-in-production"
rp_id = "localhost"
rp_name = "Admin Console Dev"

[database]
admin_url = "postgres://www-template:www-template@postgres:5432/www_template_admin?schema=admin&sslmode=disable"
product_url = "postgres://admin_console:admin_console@postgres:5432/www-template?sslmode=disable"

[valkey]
admin_url = "redis://valkey:6379/1"
product_url = "redis://valkey:6379/0"

[opensearch]
url = "http://opensearch:9200"
admin_audit_replicas = 0
admin_audit_index_prefix = "admin-audit"
product_index_prefix = "www-template"

[bootstrap]
enabled = true
secret_hash = "$2a$10$WU5jno/c6BoDS/rpiGJDpe5JVZIOiA0Hywl/7nS59ZHvas7qhDS7K"
expires_at = "2099-12-31T23:59:59Z"
