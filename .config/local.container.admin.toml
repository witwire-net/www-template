# Admin Console local container configuration.
# The local bootstrap plaintext is: dev-admin-bootstrap-secret

[server]
origin = "http://localhost:3001"
product_origin = "http://app.localhost:5174"

[cookie]
name = "www_template_admin_refresh"
domain = "localhost"
path = "/"
secure = false
same_site = "Lax"

[auth]
jwt_secret = "dev-admin-jwt-secret-change-in-production"
rp_id = "localhost"
rp_name = "Admin Console Dev"

[database]
admin_role = "admin_console_write"
url = "postgres://admin_console:admin_console@postgres:5432/www-template?sslmode=disable"

[valkey]
admin_url = "redis://valkey:6379/1"
product_url = "redis://valkey:6379/0"

[opensearch]
url = "http://opensearch:9200"
admin_audit_replicas = 0
admin_audit_index_prefix = "admin-audit"
product_index_prefix = "www-template"

[observability]
otel_exporter_otlp_endpoint = "signoz-otel-collector:4317"
otel_exporter_otlp_traces_endpoint = "signoz-otel-collector:4317"
otel_exporter_otlp_logs_endpoint = "signoz-otel-collector:4317"
otel_service_name = "www-template-admin-api"
otel_resource_attributes = "service.namespace=www-template,deployment.environment=development"

[bootstrap]
enabled = true
secret_hash = "$2a$10$WU5jno/c6BoDS/rpiGJDpe5JVZIOiA0Hywl/7nS59ZHvas7qhDS7K"
expires_at = "2099-12-31T23:59:59Z"
