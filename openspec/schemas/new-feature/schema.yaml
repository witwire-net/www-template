name: new-feature
version: 3
description: New feature workflow - confirmed intent → proposal → specs (capability Spec Units) → design → tasks

artifacts:
  - id: intent
    generates: intent.md
    description: Owner-confirmed interpretation of the requested outcome and constraints
    template: intent.md
    instruction: |
      Create the intent document that establishes WHAT THE REQUEST MEANS before proposing a change.

      Language rule:
      - Think in English; output in Japanese.
      - Keep only the template's headings, structural labels, status values, paths, commands, API/protocol names, code identifiers, and exact technical terms in English.
      - Write all explanations, evidence interpretations, assumptions, success conditions, and confirmation summaries in Japanese.

      Confirmation gate:
      - Treat the caller's wording as evidence of intent, not as an implementation-ready specification.
      - Inspect the relevant repository state before selecting an interpretation.
      - Classify solution-shaped terms as a required outcome, a non-negotiable constraint, or a candidate means.
      - Familiarity, common practice, searchable examples, or an existing implementation pattern are not evidence that a candidate means fits this repository.
      - Separate observed facts, inferences, assumptions, and unresolved decisions.
      - Look for repository evidence that would invalidate the selected interpretation or support a materially different interpretation.
      - Present the reconstructed intent to the owner and obtain explicit confirmation before writing a completed intent.md.
      - Set both `Intent-Status` and `Owner-Confirmation` to `CONFIRMED` only after explicit owner confirmation in the current conversation or a caller-provided confirmation that quotes the approved intent.
      - A confirmed intent MUST contain no unresolved decision that can change customer-visible behavior, external contracts, architecture, security, data, dependencies, or scope.

      Boundary rules:
      - intent.md defines the customer/owner outcome, confirmed constraints, relevant repository evidence, and observable success.
      - intent.md MUST NOT contain implementation tasks, file edit plans, dependency ordering, or detailed technical design.
      - Candidate means remain candidates unless the owner confirms them as required outcomes or non-negotiable constraints.
      - Do not create proposal, specs, design, or tasks before this artifact is confirmed.
    requires: []

  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.
      language rule:
      - Think in English; output in Japanese.
      - Keep only OpenSpec-required structural headings, section labels, IDs, paths, commands, API/protocol names, code identifiers, and exact technical terms in English.
      - Write all user/operator-facing prose, TODO replacements, summaries, bullets, and explanations in Japanese unless an exact identifier must remain English.

      Placeholder rule:
      - Use `<!-- TODO: 日本語で何を書くか -->` for placeholders.

      This workflow uses fixed-granularity **Spec Units** for enduring capabilities and responsibility areas.

      Spec Unit rules:
      - Spec Unit = `<capability>`
      - `<capability>`: kebab-case enduring capability/responsibility name (e.g., `user-mgmt`, `billing`, `order-checkout`)
      - Delta spec file path (within the change): `specs/<capability>/spec.md`
      - Main spec file path (source of truth after archiving/sync): `openspec/specs/<capability>/spec.md`

      Naming rules:
      - Scenario ID format: `<CAPABILITY>-S###` (e.g., `USER-MGMT-S001`)
      - Requirement reference ID format (for planning/traceability): `<CAPABILITY>-R###` (e.g., `USER-MGMT-R002`)
      - `<CAPABILITY>` is `<capability>` uppercased with hyphens preserved.

      Document structure:
      - The proposal MUST include the following headings (in this order):
        - `## Why`
        - `## What Changes`
        - `## Spec Units`
          - `### New Spec Units`
          - `### Modified Spec Units`
        - `## Naming`
        - `## Impact`

      Spec Units section requirements:
      - The Spec Units section is the contract between proposal and specs.
      - Every Spec Unit that will be created or modified MUST be listed here.
      - Each listed Spec Unit MUST have a corresponding delta spec file in `specs/<capability>/spec.md`.
      - Spec Unit names MUST describe enduring system capabilities or responsibility areas, not the current change activity.
      - Avoid change-oriented names such as `setup-*`, `migrate-*`, `rename-*`, `cleanup-*`, `replace-*`, `refactor-*`, or names copied directly from the change id unless they also describe a lasting product capability.
      - For each Spec Unit entry, include:
        - a 1-line scope summary (what this Spec Unit covers)
        - whether it is New or Modified
        - any cross-cutting concerns (security/migration/performance) if relevant

      What Changes section requirements:
      - Be explicit and user-facing.
      - Mark breaking changes with **BREAKING**.

      Naming section requirements:
      - Confirm the CAPABILITY prefix you will use for Scenario IDs and Requirement reference IDs for every Spec Unit (derived from `<capability>`).

      Proposal boundary rules:
      - Read the confirmed intent.md before authoring this artifact.
      - Do not proceed unless both `Intent-Status` and `Owner-Confirmation` are `CONFIRMED`.
      - Derive the Why, What Changes, affected Spec Units, and Impact from the confirmed outcome, constraints, repository evidence, and observable success.
      - Do not promote a candidate means from intent.md into product scope unless it was confirmed as a required outcome or non-negotiable constraint.
      - proposal.md explains why the change is needed and which lasting Spec Units are affected.
      - proposal.md MUST NOT contain implementation steps, migration task lists, file-by-file edit plans, dependency ordering, or release checklists.
      - When the change needs a user-visible UI, proposal completion is followed by an `openspec/designer` wireframe JSON, generated preview, and screenshot evidence phase before Specs are authored. The proposal states the user outcome but MUST NOT prescribe UI controls, settings, internal concepts, or visual structure.

      Keep it concise (1-2 pages). Focus on "why" not "how"; implementation details belong in design.md.
    requires:
      - intent

  - id: specs
    generates: 'specs/*/spec.md'
    description: Delta specs for each Spec Unit
    template: spec.md
    instruction: |
      Create delta specification files that define WHAT the system should do.

      Language rule:
      - Think in English; output in Japanese.
      - Keep only OpenSpec-required structural tokens in English exactly as required: delta section headings such as `## ADDED Requirements`, requirement/scenario labels such as `### Requirement:` and `#### Scenario:`, `**Customer Context**`, `**Requirement**`, `Tags: manual`, Given/When/Then labels, Scenario IDs, Requirement reference IDs, paths, commands, API/protocol names, package names, code identifiers, and exact technical terms.
      - `SHALL` and `MUST` are required normative keywords and may remain English inside Japanese sentences.
      - Write all other prose in Japanese: requirement names, scenario names, Customer Context body, Requirement body around `SHALL`/`MUST`, scenario step descriptions, REMOVED Reason/Migration notes, TODO replacements, summaries, and explanations.
      - Do not write full English requirement or scenario prose merely because the structural label or normative keyword is English.

      Placeholder rule:
      - Use `<!-- TODO: 日本語で何を書くか -->` for placeholders.

      File layout:
      - Create one delta spec per Spec Unit listed in proposal.md.
      - For Spec Unit `<capability>`, create: `specs/<capability>/spec.md`

      Delta format:
      - Use top-level `##` headers for delta sections.
      - Allowed delta sections:
        - `## ADDED Requirements`
        - `## MODIFIED Requirements`
        - `## REMOVED Requirements`
        - `## RENAMED Requirements`

      Rules for new vs existing main specs:
      - If the corresponding main spec does NOT exist yet at `openspec/specs/<capability>/spec.md`, the delta spec SHOULD contain only **ADDED** requirements.
      - MODIFIED/RENAMED require an existing main spec to apply cleanly.

      Requirement block rules (ADDED/MODIFIED):
      - Each requirement MUST start with: `### Requirement: <name>`
      - `<name>` MUST be Japanese unless it is an exact identifier.
      - Each requirement MUST include a **Customer Context** section explaining the customer pain/background that motivates it in Japanese.
      - Each requirement MUST include normative statements using SHALL or MUST (avoid should/may); the surrounding sentence MUST be Japanese unless an exact identifier is needed.
      - Each requirement MUST include at least one scenario.
      - Requirements define enduring system behavior/constraints, not the work performed in this change.

      Spec boundary rules:
      - Read the confirmed intent.md and proposal.md before authoring Requirements or Scenarios.
      - Every Requirement MUST trace to a confirmed outcome, invariant, boundary, or observable success condition.
      - Do not promote a candidate means from intent.md into a Requirement unless the owner confirmed it as a required outcome or non-negotiable constraint.
      - spec.md defines WHAT the system must do after the change is complete.
      - spec.md MUST NOT contain implementation tasks, migration procedures, file edit plans, release steps, rollout sequencing, or change-history wording tied to this specific change.
      - Avoid change-relative wording such as "in this change", "during migration", "replace X with Y", or "update package ..." unless it is required to describe a lasting externally observable constraint.
      - spec.md MUST describe only enduring end-state behavior, constraints, boundaries, and observable outcomes.
      - spec.md MUST NOT rely on before/after comparisons or wording whose meaning depends on the current change context.
      - Avoid change-relative labels such as `旧`, `新`, `現行`, `変更後`, `移行後`, `不要になった`, `再混入`, `legacy`, `deprecated`, `cleanup`, `replace`, or `refactor` in requirement/scenario prose.
      - Rewrite change-relative statements into end-state constraints such as allowed packages, forbidden dependencies, reachable modules, required runtime properties, or observable outputs.
      - Bad: "旧 frontend 構成は build graph に残ってはならない。"
      - Good: "公開 frontend と非公開 frontend の build graph は、許可された app entrypoint と shared package のみを到達可能にしなければならない。"
      - Bad: "legacy backend dependency の再混入を拒否する。"
      - Good: "Hono、Wrangler、Drizzle、Cloudflare Workers 固有 backend runtime は backend dependency として宣言されてはならない。"
      - Package/path references are allowed only when they express enduring responsibility boundaries or externally relevant structural guarantees.

      Scenario rules:
      - Each scenario MUST be a level-4 heading:
        - `#### Scenario: <name> (<SCENARIO_ID>)`
      - `<name>` MUST be Japanese unless it is an exact identifier.
      - Scenario IDs MUST be stable and MUST match: `<CAPABILITY>-S###`.
      - Scenarios SHOULD be observable and testable.
      - Prefer Given/When/Then style bullets; keep the label in English if used, but write the step text in Japanese.

      Manual scenarios:
      - If a scenario cannot be automated, include `Tags: manual` within the scenario body.
      - Place the tag close to the scenario heading (within the next ~20 lines) so tooling can detect it.

      REMOVED rules:
      - REMOVED requirements MUST include **Reason** and **Migration** notes written in Japanese except exact identifiers.

      MODIFIED workflow:
      1. Locate the existing requirement in `openspec/specs/<capability>/spec.md`
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure the requirement header text matches exactly (whitespace-insensitive)

      Quality bar:
      - Specs should be testable - each scenario is a potential test case.
      - Keep each Spec Unit focused on one enduring capability or responsibility area. If unrelated capabilities are affected, create separate Spec Units.
    requires:
      - intent
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      Document structure:
      - The design MUST use the English headings, structural section labels, and table column names present in the template.
      - English is allowed ONLY for headings, section labels, table column names, IDs, code identifiers, commands, file paths, API/protocol names, enum values, and short technical terms that should remain exact.
      - All non-label prose MUST be written in Japanese: section body text, bullet descriptions, table cell descriptions, diagram labels, test names after Scenario IDs, TODO replacements, N/A reasons, and release/rollback explanations.
      - If a section is not applicable, keep the section and write "N/A" with a brief Japanese reason.

      Placeholder rule:
      - Use `<!-- TODO: 日本語で何を書くか -->` for placeholders.
      - When replacing placeholders, keep the English label or column header intact, but write the replacement content in Japanese unless it is an exact identifier.

      Scope:
      - Clearly define In Scope and Out of Scope.

      Assumptions/Dependencies:
      - List prerequisites, external dependencies, and required migrations.

      Impacted Areas:
      - List impacted packages/modules, external systems, APIs, DB schema, and operational concerns.

      Directory Tree:
      - MUST list only files you will create/edit.
      - MUST use box-drawing characters like `└─`, `├─`, and `│`.

      New / Changed Files:
      - MUST include every created/edited file.
      - For each entry, state what changes and why in Japanese.

      Design Decisions:
      - Record each material technical decision in the `## Design Decisions` table from the template.
      - Trace each decision to confirmed intent and approved Specs.
      - Cite repository evidence that demonstrates why the selected approach fits this system.
      - Familiarity, common practice, searchable examples, and generic patterns are not repository evidence.
      - State the evidence or condition that would require the decision to be reconsidered.

      Diagrams:
      - System/Package/Sequence/Domain Model/ER diagrams MUST reflect the spec units being changed.
      - Keep diagrams minimal but accurate.
      - Diagram node/edge labels SHOULD be Japanese unless they are exact package names, class names, API paths, protocol names, or identifiers.

      UI Wireframe Screenshots (conditional):
      - OpenSpec design artifacts MUST NOT generate AI mockup images.
      - Wireframes are produced before Specs by `openspec/designer` using the `wireframe` skill (`.opencode/skills/wireframe/SKILL.md`). The `.wireframe.json` is the only editable source; `.wireframe.html` and `.wireframe-screenshot.png` are generated rendering evidence.
      - When the change has UI pages/screens, `openspec/designer` MUST create one wireframe screenshot image per materially distinct page/screen by opening the final matching `.wireframe.html` preview with `agent-browser` and capturing a screenshot.
      - Save screenshots under `openspec/changes/<change-id>/wireframe-screenshots/<screen-slug>.wireframe-screenshot.png`.
      - Embed only screenshot image files in `## UI Wireframe Screenshots` using Markdown image syntax. Never embed wireframe HTML with `<iframe>`.
      - For each page/screen, include JSON source, Generated preview, Screenshot, and Notes bullets.
      - Include the screenshot image files and their source wireframe files in **Directory Tree** and **New / Changed Files**.
      - If no UI page or viewable screen is in scope, keep the `## UI Wireframe Screenshots` section and write `N/A。対象となる UI 画面はない。`.

      Design boundary rules:
      - design.md explains HOW the approved specs will be implemented.
      - design.md MUST NOT introduce new product requirements that are absent from spec.md.
      - design.md MUST NOT replace tasks.md by listing the full implementation checklist as prose; task breakdown belongs in tasks.md.
      - Test plans in design.md describe verification design and traceability, not change history.
      - When a wireframe JSON exists, design.md implements its visible surface and does not add presentation concepts from internal architecture or implementation convenience.

      Package-Level Design:
      - Provide a package list with responsibilities, public APIs, and dependencies.
      - For each important package, include key flows, error handling, and testing strategy.
      - Keep labels such as `Purpose / Responsibility:` and `Testing Strategy:` in English, but write everything after the label in Japanese.

      Implementation Plan:
      - Use arrows to show dependency order.
      - Use branches to show parallelizable work.

      Test Plan (mandatory):
      - MUST include 4 required subsections with tables.
      - Each subsection MUST use the exact heading text and the exact columns listed below.
      - Keep the exact English heading text and column names below, but write every table cell description in Japanese except IDs, category codes, package names, paths, commands, and code identifiers.

      1) `### User Acceptance Test (Manual)`
         Columns:
         - UAT ID
         - Related Requirement
         - Spec Summary
         - Customer Problem Summary
         - Steps
         - Expected Behavior

      2) `### E2E Test (Playwright)`
         Columns:
         - E2E ID
         - Playwright Test Name
         - Related Scenario
         - Category
         - Summary
         - Steps (Playwright)
         - Expected Behavior

      3) `### Integration Test (Endpoint)`
         Columns:
         - IT ID
         - Test Name
         - Genre
         - Category
         - Summary
         - Steps (Test)
         - Expected Behavior

      4) `### Unit/Component Test (UT)`
         Columns:
         - UT ID
         - Test Name
         - Package
         - Category
         - Summary
         - Steps (Test)
         - Expected Behavior

      Test naming conventions (recommended):
      - Scenario ID: `<CAPABILITY>-S###` (e.g., `USER-MGMT-S001`)
      - Requirement reference ID: `<CAPABILITY>-R###` (e.g., `USER-MGMT-R002`)
      - Category (`CAT`): `HAP`, `ERR`, `BND`, `PERM`, `SEC`, `A11Y`, `PERF`, `REG`, `SMK`
      - UAT ID: `UAT-<CAPABILITY>-<CAT>-###`
      - E2E ID: `E2E-<CAPABILITY>-<CAT>-###`
      - IT ID: `IT-<CAPABILITY>-<CAT>-###`
      - UT ID: `UT-<CAPABILITY>-<CAT>-###`

      Traceability rules:
      - UAT rows SHOULD reference a requirement reference ID (e.g., `USER-MGMT-R001`) and the requirement name.
      - E2E/IT/UT rows SHOULD reference a Scenario ID.
      - A single Scenario ID may be covered by multiple tests (1:N). Add multiple E2E/IT/UT rows referencing the same Scenario ID as needed (happy/error/boundary/security/performance/etc.).
      - Automated tests MUST include the Scenario ID in the test title in brackets:
        - Example: `test('[USER-MGMT-S001] ユーザー作成が成功する', async () => { ... })`

      Rollback/Migration/Release:
      - If DB or contract changes exist, include rollback and migration steps.
      - Provide release steps that a teammate can follow, written in Japanese except commands and identifiers.
    requires:
      - intent
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      Language rule:
      - Think in English; output in Japanese.
      - Keep only structural task numbering, checkbox syntax, Scenario IDs, Requirement reference IDs, paths, commands, API/protocol names, package names, code identifiers, and exact technical terms in English.
      - Write task group names, task descriptions, verification explanations, TODO replacements, and notes in Japanese unless an exact identifier must remain English.

      Placeholder rule:
      - Use `<!-- TODO: 日本語で何を書くか -->` for placeholders.

      Formatting requirements:
      - MUST follow the template's checkbox format: `- [ ] X.Y Task description`
      - MUST group tasks under `##` headings.
      - Tasks MUST be dependency-ordered.
      - Tasks SHOULD be small enough to complete in one session.

      Coverage and traceability:
      - For each ADDED/MODIFIED Scenario ID, include a task to add/update automated tests.
      - It is valid (and often expected) to add multiple tests per Scenario ID (1:N) to cover different categories.
      - Automated tests MUST reference Scenario IDs in test titles using brackets.
      - Include tasks for updating docs (spec/design) when behavior changes.

      Task boundary rules:
      - Read the confirmed intent.md, approved Specs, and design.md before authoring tasks.
      - Every implementation task MUST trace to approved scope or a material design decision; do not create tasks solely because they commonly accompany a named solution.
      - tasks.md defines concrete implementation work only.
      - tasks.md MUST NOT restate product requirements using SHALL/MUST language.
      - tasks.md MUST NOT include Customer Context, requirement prose blocks, or architectural rationale that belongs in proposal/spec/design.

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - intent
      - specs
      - design

apply:
  requires:
    - intent
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
