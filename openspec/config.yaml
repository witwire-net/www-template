schema: new-feature

context: |
  Repository: www-template
  Tech stack: TypeScript, SvelteKit, Cloudflare Workers, Go, TypeSpec, Vite
  Frontend packages: packages/frontend/app (SvelteKit app on Cloudflare Workers), packages/frontend/domain (shared domain logic), packages/frontend/api (API client), packages/frontend/ui (UI primitives)
  Backend packages: packages/backend/cmd and packages/backend/internal/* (Go API)
  API contract: packages/typespec/main.tsp is the source of truth; pnpm gen regenerates OpenAPI, frontend SDK, and Go bindings
  Testing: Vitest (unit/component/integration), Playwright (e2e), Go tests

  Architecture:
  - frontend/app -> frontend/domain -> frontend/api
  - backend/cmd -> backend/internal/app -> backend/internal/http|persistence|usecases -> backend/internal/domain -> backend/internal/types
  - public routes use api/v1/*; app routes use api/v1/*
  - GORM imports are allowed only under packages/backend/internal/persistence/**
  - AutoMigrate is banned; use packages/backend/db/migrations/** with golang-migrate
  - OpenSpec is archived from the default lint/CI loop; dedicated `pnpm lint:openspec` validates schemas and confirmed Intent

  Intent confirmation boundary:
  - Treat the request as evidence of intent, not as an implementation-ready specification.
  - Every Change MUST begin with a confirmed `intent.md` before proposal, specs, design, or tasks are authored.
  - Classify solution-shaped terms as a required outcome, a non-negotiable constraint, or a candidate means. Familiarity or common example code is not evidence that a candidate means fits this repository.
  - Ground the interpretation in repository evidence, separate observations from inferences and assumptions, and check for evidence that would invalidate the interpretation.
  - The owner MUST explicitly confirm the reconstructed intent. Downstream artifacts preserve that confirmed intent and MUST NOT reinterpret it.

  Spec -> Test contract:
  - Change-local specs live under openspec/changes/**/specs/**/spec.md
  - Canonical main specs live at openspec/specs/**/spec.md
  - Every Scenario heading MUST end with a stable Scenario ID in parentheses:
    - Example: #### Scenario: Create a user (USER-MGMT-S001)
  - Scenario ID format: ^[A-Z0-9]+(?:-[A-Z0-9]+)*-S\d{3,}$
  - Automated tests MUST reference Scenario IDs in test titles using brackets:
    - Example: it('[USER-MGMT-S001] ...', ...)
  - If a scenario cannot be automated, mark it explicitly with: Tags: manual

  Note on Spec Units:
  - Some schemas in this repo (e.g., new-feature, and future fix-feature/change-feature) use Spec Units:
    - Spec Unit = <capability>
    - <capability>: kebab-case enduring capability/responsibility name (e.g., user-mgmt)
    - Change spec path: openspec/changes/<change>/specs/<capability>/spec.md
    - Main spec path: openspec/specs/<capability>/spec.md

rules:
  intent:
    - Do not write a confirmed intent artifact until the owner explicitly confirms the reconstructed intent.
    - Cite repository evidence and separate observed facts, inferences, assumptions, and unresolved decisions.
    - Do not leave decisions that can change customer-visible behavior, contracts, architecture, security, data, dependencies, or scope unresolved in a confirmed intent.
  specs:
    - Every Scenario heading MUST include a Scenario ID suffix in parentheses.
    - Scenario IDs MUST use the uppercased Spec Unit prefix (e.g., USER-MGMT-S001).
    - Prefer Given/When/Then bullets. Keep scenarios testable and observable.
    - If a scenario cannot be automated, include `Tags: manual` and explain why in the change proposal/PR.
  tasks:
    - For each ADDED/MODIFIED Scenario ID, include a task to add/update automated tests that reference the Scenario ID.

