services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      opensearch:
        condition: service_started
      minio:
        condition: service_started
      mailpit:
        condition: service_started
      signoz-otel-collector:
        condition: service_healthy
    environment:
      CONFIG_PATH: /workspaces/www-template/.config/local.toml
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /home/node/.cache/go-build
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      ADMIN_CONFIG_PATH: /workspaces/www-template/.config/local.admin.toml
      NODE_ENV: development
      TOOLCHAIN_GO_VERSION: 1.26.4
      TOOLCHAIN_PNPM_VERSION: 11.6.0
      TOOLCHAIN_GORM_VERSION: 1.31.0
      TOOLCHAIN_GOLANG_MIGRATE_VERSION: 4.18.3
      TOOLCHAIN_OAPI_CODEGEN_VERSION: 2.4.1
      TOOLCHAIN_TYPESPEC_VERSION: 1.8.0
      TOOLCHAIN_OPENSPEC_VERSION: 1.3.1
      TOOLCHAIN_AGENT_BROWSER_VERSION: 0.27.0
    extra_hosts:
      - host.docker.internal:host-gateway
    init: true
    ports:
      - '127.0.0.1:1455:1455'
      - '127.0.0.1:24282:24282'
      - '127.0.0.1:3001:3001'
      - '127.0.0.1:4848:4848'
      - '127.0.0.1:5173:5173'
      - '127.0.0.1:5174:5174'
      - '127.0.0.1:5176:5176'
      - '127.0.0.1:8080:8080'
      - '127.0.0.1:8081:8081'
    volumes:
      - ..:/workspaces/www-template:cached
      - go-build-cache:/home/node/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - playwright-cache:/ms-playwright
      - pnpm-store:/home/node/.local/share/pnpm/store
      - agent-browser-cache:/home/node/.agent-browser

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: www-template
      POSTGRES_PASSWORD: www-template
      POSTGRES_USER: www-template
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U www-template -d www-template']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres18-data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:9.0.3-alpine
    command: ['valkey-server', '--save', '', '--appendonly', 'no']
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      discovery.type: single-node
    restart: unless-stopped
    ports:
      - '127.0.0.1:9200:9200'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    ports:
      - '127.0.0.1:9001:9001'
    restart: unless-stopped
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '127.0.0.1:8025:8025'
    restart: unless-stopped

  signoz-init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
        chmod +x /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - signoz-clickhouse-user-scripts:/var/lib/clickhouse/user_scripts

  signoz-zookeeper:
    image: signoz/zookeeper:3.7.1
    user: root
    hostname: zookeeper-1
    networks:
      default:
        aliases:
          - zookeeper-1
    environment:
      ZOO_SERVER_ID: '1'
      ALLOW_ANONYMOUS_LOGIN: 'yes'
      ZOO_AUTOPURGE_INTERVAL: '1'
      ZOO_ENABLE_PROMETHEUS_METRICS: 'yes'
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: '9141'
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - signoz-zookeeper-data:/bitnami/zookeeper

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    entrypoint:
      - /bin/bash
      - /etc/signoz/clickhouse-entrypoint.sh
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      signoz-zookeeper:
        condition: service_healthy
    hostname: clickhouse
    networks:
      default:
        aliases:
          - clickhouse
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: '1'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', '0.0.0.0:8123/ping']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-file: '3'
        max-size: 50m
    restart: unless-stopped
    tty: true
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
      nproc: 65535
    volumes:
      - type: bind
        source: ./signoz
        target: /etc/signoz
        read_only: true
        bind:
          create_host_path: false
      - signoz-clickhouse-user-scripts:/var/lib/clickhouse/user_scripts
      - signoz-clickhouse-data:/var/lib/clickhouse

  signoz:
    image: signoz/signoz:v0.126.1
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    hostname: signoz
    networks:
      default:
        aliases:
          - signoz
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: secret
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8080/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - '127.0.0.1:3301:8080'
    restart: unless-stopped
    volumes:
      - signoz-query-data:/var/lib/signoz

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:v0.144.4
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    restart: on-failure

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:v0.144.4
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector \
          --config=/etc/signoz/otel-collector-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: 'false'
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'found_health=0; found_otlp=0; for file in /proc/net/tcp /proc/net/tcp6; do [ -r "$${file}" ] || continue; while read -r _ addr _ state _; do case "$${addr}:$${state}" in *:334D:0A) found_health=1;; *:10DD:0A) found_otlp=1;; esac; done < "$${file}"; done; [ "$${found_health}" = 1 ] && [ "$${found_otlp}" = 1 ]',
        ]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 5s
    hostname: signoz-otel-collector
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./signoz
        target: /etc/signoz
        read_only: true
        bind:
          create_host_path: false

volumes:
  go-build-cache:
  go-mod-cache:
  minio-data:
  opensearch-data:
  playwright-cache:
  pnpm-store:
  postgres18-data:
  valkey-data:
  agent-browser-cache:
  signoz-clickhouse-data:
  signoz-clickhouse-user-scripts:
  signoz-query-data:
  signoz-zookeeper-data:
