services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      opensearch:
        condition: service_started
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      CONFIG_PATH: /workspaces/www-template/.config/local.toml
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /home/node/.cache/go-build
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      TOOLCHAIN_GO_VERSION: 1.26.3
      TOOLCHAIN_PNPM_VERSION: 11.1.2
      TOOLCHAIN_GORM_VERSION: 1.31.0
      TOOLCHAIN_GOLANG_MIGRATE_VERSION: 4.18.3
      TOOLCHAIN_OAPI_CODEGEN_VERSION: 2.4.1
      TOOLCHAIN_TYPESPEC_VERSION: 1.8.0
      TOOLCHAIN_OPENSPEC_VERSION: 1.2.0
      TOOLCHAIN_AGENT_BROWSER_VERSION: 0.27.0
    extra_hosts:
      - host.docker.internal:host-gateway
    init: true
    volumes:
      - ..:/workspaces/www-template:cached
      - go-build-cache:/home/node/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - playwright-cache:/ms-playwright
      - pnpm-store:/home/node/.local/share/pnpm/store
      - agent-browser-cache:/home/node/.agent-browser

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: www-template
      POSTGRES_PASSWORD: www-template
      POSTGRES_USER: www-template
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U www-template -d www-template']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres18-data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:9.0.3-alpine
    command: ['valkey-server', '--save', '', '--appendonly', 'no']
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      discovery.type: single-node
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    restart: unless-stopped
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ['--config=/etc/otel-collector-config.yaml']
    ports:
      - '4317:4317'
      - '4318:4318'
    restart: unless-stopped
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.3.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    ports:
      - '9090:9090'
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  tempo:
    image: grafana/tempo:2.7.0
    user: '0'
    command: ['-config.file=/etc/tempo.yml']
    ports:
      - '3200:3200'
    restart: unless-stopped
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo

  loki:
    image: grafana/loki:3.4.0
    command: ['-config.file=/etc/loki/local-config.yaml']
    ports:
      - '3100:3100'
    restart: unless-stopped
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_ORG_ROLE: Editor
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - ../.devcontainer/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../.devcontainer/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  go-build-cache:
  go-mod-cache:
  minio-data:
  opensearch-data:
  playwright-cache:
  pnpm-store:
  postgres18-data:
  valkey-data:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
  agent-browser-cache:
