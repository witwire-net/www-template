services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      opensearch:
        condition: service_started
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      CONFIG_PATH: /workspaces/www-template/.config/local.toml
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /home/node/.cache/go-build
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      ADMIN_CONFIG_PATH: /workspaces/www-template/.config/local.admin.toml
      NODE_ENV: development
      TOOLCHAIN_GO_VERSION: 1.26.3
      TOOLCHAIN_PNPM_VERSION: 11.1.2
      TOOLCHAIN_GORM_VERSION: 1.31.0
      TOOLCHAIN_GOLANG_MIGRATE_VERSION: 4.18.3
      TOOLCHAIN_OAPI_CODEGEN_VERSION: 2.4.1
      TOOLCHAIN_TYPESPEC_VERSION: 1.8.0
      TOOLCHAIN_OPENSPEC_VERSION: 1.2.0
      TOOLCHAIN_AGENT_BROWSER_VERSION: 0.27.0
    extra_hosts:
      - host.docker.internal:host-gateway
    init: true
    volumes:
      - ..:/workspaces/www-template:cached
      - go-build-cache:/home/node/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - playwright-cache:/ms-playwright
      - pnpm-store:/home/node/.local/share/pnpm/store
      - agent-browser-cache:/home/node/.agent-browser

  admin:
    build:
      context: ..
      dockerfile: packages/admin/app/Dockerfile
    ports:
      - '3001:80'
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: www-template
      POSTGRES_PASSWORD: www-template
      POSTGRES_USER: www-template
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U www-template -d www-template']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres18-data:/var/lib/postgresql
      - ./initdb:/docker-entrypoint-initdb.d:ro

  valkey:
    image: valkey/valkey:9.0.3-alpine
    command: ['valkey-server', '--save', '', '--appendonly', 'no']
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      discovery.type: single-node
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    restart: unless-stopped
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

  signoz-zookeeper:
    image: bitnami/zookeeper:3.7.1
    environment:
      ALLOW_ANONYMOUS_LOGIN: 'yes'
      ZOO_AUTOPURGE_INTERVAL: '1'
      ZOO_SERVER_ID: '1'
    hostname: zookeeper-1
    networks:
      default:
        aliases:
          - zookeeper-1
    restart: unless-stopped
    user: root
    volumes:
      - signoz-zookeeper-data:/bitnami/zookeeper

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    depends_on:
      signoz-zookeeper:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', '0.0.0.0:8123/ping']
      interval: 30s
      timeout: 5s
      retries: 3
    hostname: clickhouse
    logging:
      options:
        max-file: '3'
        max-size: 50m
    networks:
      default:
        aliases:
          - clickhouse
    restart: unless-stopped
    tty: true
    ulimits:
      nofile:
        hard: 262144
        soft: 262144
      nproc: 65535
    volumes:
      - ./signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./signoz/custom-function.xml:/etc/clickhouse-server/custom-function.xml:ro
      - signoz-clickhouse-data:/var/lib/clickhouse

  signoz-otel-migrator-sync:
    image: signoz/signoz-schema-migrator:0.111.24
    command: ['sync', '--dsn=tcp://clickhouse:9000', '--up=']
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: 'no'

  signoz-otel-migrator-async:
    image: signoz/signoz-schema-migrator:0.111.24
    command: ['async', '--dsn=tcp://clickhouse:9000', '--up=']
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-otel-migrator-sync:
        condition: service_completed_successfully
    restart: 'no'

  signoz-query-service:
    image: signoz/query-service:0.69.0
    command:
      - -config=/root/config/query-service.yml
      - --use-logs-new-schema=true
      - --use-trace-new-schema=true
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-otel-migrator-sync:
        condition: service_completed_successfully
    environment:
      ALERTMANAGER_API_PREFIX: http://alertmanager:9093/api/
      ClickHouseUrl: tcp://clickhouse:9000
      DASHBOARDS_PATH: /root/config/dashboards
      DEPLOYMENT_TYPE: docker-standalone-amd
      GODEBUG: netdns=go
      SIGNOZ_LOCAL_DB_PATH: /var/lib/signoz/signoz.db
      STORAGE: clickhouse
      TELEMETRY_ENABLED: 'false'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8080/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    hostname: query-service
    networks:
      default:
        aliases:
          - query-service
    restart: unless-stopped
    volumes:
      - ./signoz/alerts.yml:/root/config/alerts.yml:ro
      - ./signoz/dashboards:/root/config/dashboards:ro
      - ./signoz/query-service.yml:/root/config/query-service.yml:ro
      - signoz-query-data:/var/lib/signoz

  signoz-alertmanager:
    image: signoz/alertmanager:0.23.7
    command:
      - --queryService.url=http://query-service:8085
      - --storage.path=/data
    depends_on:
      signoz-query-service:
        condition: service_healthy
    hostname: alertmanager
    networks:
      default:
        aliases:
          - alertmanager
    restart: unless-stopped
    volumes:
      - signoz-alertmanager-data:/data

  signoz-frontend:
    image: signoz/frontend:0.69.0
    depends_on:
      signoz-alertmanager:
        condition: service_started
      signoz-query-service:
        condition: service_healthy
    ports:
      - '3301:3301'
    restart: unless-stopped
    volumes:
      - ./signoz/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.111.24
    command:
      - --config=/etc/otel-collector-config.yaml
      - --manager-config=/etc/manager-config.yaml
      - --copy-path=/var/tmp/collector-config.yaml
      - --feature-gates=-pkg.translator.prometheus.NormalizeName
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-otel-migrator-sync:
        condition: service_completed_successfully
      signoz-query-service:
        condition: service_healthy
    environment:
      LOW_CARDINAL_EXCEPTION_GROUPING: 'false'
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
    hostname: signoz-otel-collector
    ports:
      - '4317:4317'
      - '4318:4318'
    restart: unless-stopped
    volumes:
      - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml:ro

volumes:
  go-build-cache:
  go-mod-cache:
  minio-data:
  opensearch-data:
  playwright-cache:
  pnpm-store:
  postgres18-data:
  valkey-data:
  agent-browser-cache:
  signoz-alertmanager-data:
  signoz-clickhouse-data:
  signoz-query-data:
  signoz-zookeeper-data:
